<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentient | Emotion Galaxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-DYADZuXR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-JotYjiur.css">
  </head>
  <body>
    <!-- Three.js Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <main class="ui-layer">
      <header>
        <h1>Sentient</h1>
        <p>A reactive emotional universe</p>
      </header>

      <section class="controls">
        <label for="emotion-select">How are you feeling?</label>
        <div class="emotion-buttons">
          <button class="btn calm" data-emotion="calm">Calm</button>
          <button class="btn happy" data-emotion="happy">Joyful</button>
          <button class="btn energetic" data-emotion="energetic">Energetic</button>
          <button class="btn sad" data-emotion="sad">Melancholic</button>
          <button class="btn angry" data-emotion="angry">Fiery</button>
        </div>
      </section>
    </main>

  </body>
</html>
